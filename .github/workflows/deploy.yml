name: نشر ملبّيك إلى الاستضافة (cPanel عبر FTP)

# يُبنى المشروع ويُرفع تلقائيًّا إلى public_html عند كلّ دفعةٍ إلى main،
# أو يدويًّا من تبويب Actions (Run workflow).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: جلب الكود
        uses: actions/checkout@v4

      - name: تهيئة Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: تثبيت الاعتماديّات
        run: npm ci

      - name: بناء النسخة الإنتاجيّة
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: الرفع إلى الاستضافة عبر FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # يرفع المتغيّر فقط (يحفظ حالة المزامنة على الخادم) — أسرع رفعٍ بعد الأوّل
          dangerous-clean-slate: false
