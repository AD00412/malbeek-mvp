<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ملبّيك · إدارة حملات العُمرة</title>
    <meta name="description" content="منصّة ملبّيك لإدارة حملات العُمرة: الرحلات، المعتمرون، اختيار المقاعد، الكشوف الرسميّة، والتذاكر بالباركود." />

    <!-- الأيقونة والهويّة (‎?v=2‎ يُجبر المتصفّح على تجاهل الشعار القديم المخزَّن) -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=2" />
    <link rel="apple-touch-icon" href="/icon.svg?v=2" />
    <link rel="mask-icon" href="/icon.svg?v=2" color="#059669" />
    <meta name="theme-color" content="#063D2C" />

    <!-- تطبيقٌ قابلٌ للتثبيت (PWA) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ملبّيك" />

    <!-- مشاركةٌ أنيقةٌ عند إرسال الروابط -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ملبّيك · إدارة حملات العُمرة" />
    <meta property="og:description" content="سجّل، اختر مقعدك، واحصل على تذكرتك بالباركود — مع حملتك." />
    <meta property="og:image" content="/icon.svg?v=2" />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <!-- طبّق الوضع المحفوظ قبل رسم React: يمنع وميض الانتقال بين الفاتح والغامق -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('malbeek-theme');
          if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
