<!DOCTYPE html>

<head>

<body style="margin:0;padding:0;background:#f4faf6;font-family:Tahoma,'Segoe UI',Arial,sans-serif;">

    <tr><td align="center">

          </p>
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin:0 0 22px;"><tr><td align="center">
            <div style="display:inline-block;background:#eaf6ef;border:1px solid rgba(6,95,70,.18);border-radius:12px;padding:16px 28px;font-size:34px;font-weight:800;letter-spacing:8px;color:#047857;direction:ltr;">{{ .Token }}</div>
          </td></tr></table>
          <p style="margin:0;font-size:12.5px;line-height:1.8;color:#5f7a6e;border-top:1px solid #eaf6ef;padding-top:16px;">

          </p>
        </td></tr>
        <tr><td style="padding:20px 32px;background:#eaf6ef;text-align:center;border-top:1px solid rgba(6,95,70,.1);">
          <div style="font-size:13px;font-weight:700;color:#047857;">ملبّيك · mulabeek.com</div>
