# نشر ملبّيك على Netlify (يصلح أيضًا أساسًا لإعداد Cloudflare Pages)
[build]
  command = "npm run build"
  publish = "dist"

# إعادة توجيه كلّ المسارات إلى index.html (تطبيقٌ أحاديّ الصفحة — يمنع الصفحة البيضاء عند التحديث)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ذاكرةُ تخزينٍ طويلةٌ للأصول المبصومة (hashed) — تحديثٌ فوريٌّ مع كلّ إصدار
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
